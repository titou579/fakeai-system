<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IA esclave de Nelio</title>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      width:350px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    input, textarea{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:white;
    }

    button{
      width:100%;
      margin-top:15px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    h1{
      text-align:center;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>IA esclave de Nelio</h1>

  <input type="text" placeholder="Votre pseudo" id="pseudo">

  <textarea
    id="message"
    placeholder="Parlez à l'IA..."
    rows="5"
  ></textarea>

  <button onclick="sendMessage()">
    Envoyer
  </button>
</div>

<script>
function sendMessage(){

  const pseudo = document.getElementById("pseudo").value
  const message = document.getElementById("message").value

  alert(
    "Message envoyé à l'IA 😎\n\nPseudo : "
    + pseudo +
    "\nMessage : " +
    message
  )
}
</script>

</body>
</html>
